<script>
// ════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════
const SUPA_URL = 'https://ppmdabvtdoaodzzjqqsc.supabase.co';
const SUPA_KEY = 'sb_publishable_Bx3WGtuoNlSlQU5MBtJsnQ_Fljdsow1';
const DB = supabase.createClient(SUPA_URL, SUPA_KEY);

const YEAR_MIN = 2020;
const YEAR_MAX = 2040;

// ════════════════════════════════════════════════════════
// ÉTAT
// ════════════════════════════════════════════════════════
let UID   = null;
let ANNEE = 2026;
let P = {
  nomEnt:'', secteur:'', regimeTVA:'TVA réelle mensuelle',
  regimeFisc:'IS — Impôt sur les sociétés', devise:'€ Euro',
  cle:'qte', obj:0, tresoInit:0, moisDeb:1, moisFin:12,
};
let articles = [];
let charges  = [];

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const sbq = (p, ms=12000) => Promise.race([
  p,
  new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms))
]);

let _saveTimer = null;
function schedSave() {
  markUnsaved();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveParams, 1500);
}
function markUnsaved() {
  const d = $('sdot');
  if(d) d.classList.remove('saved');
  const t = $('stxt');
  if(t) t.textContent = 'Enregistrement...';
}
function setSaved() {
  const d = $('sdot');
  if(d) d.classList.add('saved');
  const t = $('stxt');
  if(t) t.textContent = 'Enregistré';
}

// ════════════════════════════════════════════════════════
// PARAMÈTRES ENTREPRISE
// ════════════════════════════════════════════════════════
async function loadParams() {
  if(!UID) return;

  try {
    const {data, error} = await sbq(
      DB.from('parametres')
        .select('*')
        .eq('user_id', UID)
        .lte('annee', ANNEE)
        .order('annee', {ascending:false})
        .limit(1)
    );

    if(error) {
      console.warn('[params]', error.message);
      return;
    }

    console.log(
      '[params] annee active='+ANNEE,
      'lignes trouvées='+(data ? data.length : 0),
      data && data[0] ? 'annee_ligne='+data[0].annee : ''
    );

    if(!data || !data.length) {
      console.warn('[params] aucune ligne ≤ '+ANNEE);
      P = {
        nomEnt:'', secteur:'', regimeTVA:'TVA réelle mensuelle',
        regimeFisc:'IS — Impôt sur les sociétés', devise:'€ Euro',
        cle:'qte', obj:0, tresoInit:0, moisDeb:1, moisFin:12,
      };
      renderEntreprise();
      return;
    }

    const row = data[0];
    const exact = row.annee === ANNEE;

    console.log(
      '[params] exact='+exact,
      'nom='+(row.nom_entreprise || ''),
      'tva='+(row.regime_tva || ''),
      'obj='+(row.objectif_ca || 0)
    );

    P.nomEnt     = row.nom_entreprise || '';
    P.secteur    = row.secteur || '';
    P.regimeTVA  = row.regime_tva || 'TVA réelle mensuelle';
    P.regimeFisc = row.regime_fiscal || 'IS — Impôt sur les sociétés';
    P.devise     = row.devise || '€ Euro';
    P.cle        = row.cle_repartition || 'qte';
    P.moisDeb    = row.mois_debut || 1;
    P.moisFin    = row.mois_fin || 12;
    P.tresoInit  = row.treso_init || 0;

    // Objectif CA indépendant de l'héritage
    P.obj = exact ? (row.objectif_ca || 0) : 0;

    renderEntreprise();
  } catch(e) {
    console.warn('[params timeout]', e.message);
  }
}

async function propagateParamsForward() {
  if(!UID) return;

  try {
    const futureYears = [];
    for(let y = ANNEE + 1; y <= YEAR_MAX; y++) futureYears.push(y);
    if(!futureYears.length) return;

    // Récupérer les objectifs déjà saisis dans les années futures
    const { data: existing, error: existingError } = await sbq(
      DB.from('parametres')
        .select('*')
        .eq('user_id', UID)
        .gte('annee', ANNEE + 1)
        .lte('annee', YEAR_MAX)
    );

    if(existingError) {
      console.warn('[propagate params existing]', existingError.message);
      return;
    }

    const existingByYear = {};
    (existing || []).forEach(r => {
      existingByYear[r.annee] = r;
    });

    const rows = futureYears.map(y => {
      const ex = existingByYear[y];
      return {
        user_id: UID,
        annee: y,
        nom_entreprise: P.nomEnt,
        secteur: P.secteur,
        regime_tva: P.regimeTVA,
        regime_fiscal: P.regimeFisc,
        devise: P.devise,
        cle_repartition: P.cle,
        treso_init: P.tresoInit,
        mois_debut: P.moisDeb,
        mois_fin: P.moisFin,
        // Objectif CA reste propre à chaque année future
        objectif_ca: ex ? (ex.objectif_ca || 0) : 0,
      };
    });

    const { error } = await sbq(
      DB.from('parametres').upsert(rows, {
        onConflict: 'user_id,annee'
      })
    );

    if(error) console.warn('[propagate params]', error.message);
  } catch(e) {
    console.warn('[propagate params timeout]', e.message);
  }
}

async function saveParams() {
  if(!UID) return;

  try {
    const {error} = await sbq(
      DB.from('parametres').upsert({
        user_id: UID,
        annee: ANNEE,
        nom_entreprise: P.nomEnt,
        secteur: P.secteur,
        regime_tva: P.regimeTVA,
        regime_fiscal: P.regimeFisc,
        devise: P.devise,
        cle_repartition: P.cle,
        objectif_ca: P.obj,
        treso_init: P.tresoInit,
        mois_debut: P.moisDeb,
        mois_fin: P.moisFin,
      }, {onConflict:'user_id,annee'})
    );

    if(error) {
      console.warn('[save params]', error.message);
      return;
    }

    await propagateParamsForward();
    setSaved();
  } catch(e) {
    console.warn('[save params timeout]', e.message);
  }
}

function renderEntreprise() {
  const set = (id, v) => {
    const e = $(id);
    if(e) e.value = v;
  };

  set('ent-nom',  P.nomEnt);
  set('ent-sect', P.secteur);
  set('ent-obj',  P.obj);
  set('ent-tva',  P.regimeTVA);
  set('ent-fisc', P.regimeFisc);
  set('ent-dev',  P.devise);

  document.querySelectorAll('input[name="cle"]').forEach(r => {
    r.checked = r.value === P.cle;
  });

  const lbl = $('params-annee-lbl');
  if(lbl) lbl.textContent = ANNEE;
}

function bindEntreprise() {
  $('ent-nom').addEventListener('input',   e => { P.nomEnt     = e.target.value;                schedSave(); });
  $('ent-sect').addEventListener('change', e => { P.secteur    = e.target.value;                schedSave(); });
  $('ent-obj').addEventListener('input',   e => { P.obj        = parseFloat(e.target.value)||0; schedSave(); });
  $('ent-tva').addEventListener('change',  e => { P.regimeTVA  = e.target.value;                schedSave(); });
  $('ent-fisc').addEventListener('change', e => { P.regimeFisc = e.target.value;                schedSave(); });
  $('ent-dev').addEventListener('change',  e => { P.devise     = e.target.value;                schedSave(); });

  document.querySelectorAll('input[name="cle"]').forEach(r => {
    r.addEventListener('change', e => {
      P.cle = e.target.value;
      schedSave();
    });
  });
}

// ════════════════════════════════════════════════════════
// ARTICLES
// ════════════════════════════════════════════════════════
async function loadArticles() {
  if(!UID) return;

  try {
    const {data, error} = await sbq(
      DB.from('articles')
        .select('*')
        .eq('user_id', UID)
        .order('annee', {ascending:true})
    );

    if(error) {
      console.warn('[articles]', error.message);
      return;
    }

    const byCode = {};
    (data || []).forEach(r => {
      if(r.annee <= ANNEE) byCode[r.code] = r;
    });

    articles = Object.values(byCode)
      .filter(r => r.actif !== false)
      .map(r => ({
        code: r.code,
        nom: r.nom,
        cat: r.categorie || 'Divers',
        pv: parseFloat(r.prix_ht) || 0,
        cout: parseFloat(r.cout_achat) || 0,
        tva: parseFloat(r.tva) || 0.2,
        actif: r.actif !== false,
      }));

    renderArticles();
  } catch(e) {
    console.warn('[articles timeout]', e.message);
  }
}

async function propagateArticleForward(a) {
  if(!UID) return;

  try {
    const rows = [];
    for(let y = ANNEE + 1; y <= YEAR_MAX; y++) {
      rows.push({
        user_id: UID,
        code: a.code,
        annee: y,
        nom: a.nom,
        categorie: a.cat,
        prix_ht: a.pv,
        cout_achat: a.cout,
        tva: a.tva,
        actif: a.actif,
      });
    }

    if(!rows.length) return;

    const { error } = await sbq(
      DB.from('articles').upsert(rows, {
        onConflict: 'user_id,code,annee'
      })
    );

    if(error) console.warn('[propagate article]', error.message);
  } catch(e) {
    console.warn('[propagate article timeout]', e.message);
  }
}

async function upsertArticle(a) {
  if(!UID) return;

  const {error} = await sbq(
    DB.from('articles').upsert({
      user_id: UID,
      code: a.code,
      annee: ANNEE,
      nom: a.nom,
      categorie: a.cat,
      prix_ht: a.pv,
      cout_achat: a.cout,
      tva: a.tva,
      actif: a.actif,
    }, {onConflict:'user_id,code,annee'})
  );

  if(error) {
    console.warn('[upsert article]', error.message);
    return;
  }

  await propagateArticleForward(a);
  setSaved();
}

function addArt() {
  const nom = $('pa-nom').value.trim();
  if(!nom) return;

  const code = $('pa-code').value.trim() || 'ART'+String(Date.now()).slice(-6);

  const a = {
    code,
    nom,
    cat: $('pa-cat').value || 'Divers',
    pv: parseFloat($('pa-pv').value) || 0,
    cout: parseFloat($('pa-cout').value) || 0,
    tva: parseFloat($('pa-tva').value) || 0.2,
    actif: true,
  };

  articles.push(a);

  ['pa-code','pa-nom','pa-cat','pa-pv','pa-cout'].forEach(id => $(id).value='');
  $('p-art-add').classList.remove('open');

  upsertArticle(a);
  renderArticles();
}

async function delArt(i) {
  const a = articles[i];
  if(!a) return;

  if(!confirm(`Supprimer "${a.nom}" à partir de ${ANNEE} ?`)) return;

  a.actif = false;
  articles.splice(i,1);
  await upsertArticle(a);
  renderArticles();
}

function renderArticles() {
  const tb = $('art-tbody');
  if(!tb) return;

  if(!articles.length) {
    tb.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--t2)">Aucun article — cliquez sur + Ajouter</td></tr>';
    return;
  }

  const tvaOpts = sel => [[0.2,'20%'],[0.1,'10%'],[0.055,'5,5%'],[0,'0%']]
    .map(([v,l]) => `<option value="${v}" ${Number(sel)===Number(v)?'selected':''}>${l}</option>`)
    .join('');

  tb.innerHTML = articles.map((a,i) => {
    const mg = a.pv > 0 ? ((a.pv - a.cout) / a.pv) * 100 : 0;
    const col = mg >= 40 ? 'var(--gr)' : mg >= 20 ? 'var(--am)' : 'var(--rd)';

    return `<tr>
      <td><input class="tdinp" value="${a.code}" style="max-width:88px"
        onblur="articles[${i}].code=this.value.trim();upsertArticle(articles[${i}])"></td>
      <td><input class="tdinp" value="${a.nom}"
        onblur="articles[${i}].nom=this.value;upsertArticle(articles[${i}])"></td>
      <td><input class="tdinp" value="${a.cat}" style="max-width:100px"
        onblur="articles[${i}].cat=this.value;upsertArticle(articles[${i}])"></td>
      <td><input class="tdinp" type="number" value="${a.pv}" style="max-width:80px"
        onblur="articles[${i}].pv=parseFloat(this.value)||0;upsertArticle(articles[${i}]);renderArticles()"></td>
      <td><input class="tdinp" type="number" value="${a.cout}" style="max-width:80px"
        onblur="articles[${i}].cout=parseFloat(this.value)||0;upsertArticle(articles[${i}]);renderArticles()"></td>
      <td><select class="tdsel" style="max-width:78px"
        onchange="articles[${i}].tva=parseFloat(this.value);upsertArticle(articles[${i}])">${tvaOpts(a.tva)}</select></td>
      <td><span style="font-family:var(--fm);font-size:12.5px;color:${col};font-weight:700">${mg.toFixed(1)} %</span></td>
      <td><select class="tdsel" style="max-width:70px"
        onchange="articles[${i}].actif=this.value==='true';upsertArticle(articles[${i}])">
        <option value="true" ${a.actif?'selected':''}>Oui</option>
        <option value="false" ${!a.actif?'selected':''}>Non</option>
      </select></td>
      <td><button class="delbtn" onclick="delArt(${i})">×</button></td>
    </tr>`;
  }).join('');
}

async function delCh(i) {

  renderCharges();

function renderCharges() {

  if(!tb) return;

  if(!charges.length) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--t2)">Aucune charge — cliquez sur + Ajouter</td></tr>';
    $('rep-f').textContent = 'Fixe : 0';

// ════════════════════════════════════════════════════════
// NAVIGATION ANNÉES
// ════════════════════════════════════════════════════════
async function changeAnnee(n) {
  n = parseInt(n);
  if(isNaN(n) || n === ANNEE) return;

  clearTimeout(_saveTimer);
  await saveParams();

  ANNEE = n;
  localStorage.setItem('lp_annee_'+UID, ANNEE);

  P = {
    nomEnt:'', secteur:'', regimeTVA:'TVA réelle mensuelle',
    regimeFisc:'IS — Impôt sur les sociétés', devise:'€ Euro',
    cle:'qte', obj:0, tresoInit:0, moisDeb:1, moisFin:12
  };

  renderAnneesNav();
  await Promise.all([loadParams(), loadArticles(), loadCharges()]);
}

function renderAnneesNav() {
  const a = $('sb-annee');
  if(a) a.textContent = ANNEE;

  const lbl = $('params-annee-lbl');
  if(lbl) lbl.textContent = ANNEE;

  const btns = $('sb-annees');
  if(btns) {
    const years = [ANNEE-1, ANNEE, ANNEE+1].filter(y => y >= YEAR_MIN && y <= YEAR_MAX);

    btns.innerHTML = years.map(y => `<button
      style="flex:1;padding:3px 6px;border-radius:5px;font-size:11px;
      font-weight:${y===ANNEE?700:400};cursor:pointer;
      background:${y===ANNEE?'var(--ac)':'var(--bgc)'};
      color:${y===ANNEE?'#fff':'var(--t3)'};
      border:1px solid ${y===ANNEE?'var(--ac)':'var(--bd)'}"
      data-year="${y}">${y}</button>`).join('');

    btns.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => changeAnnee(b.dataset.year));
    });
  }
}

// ════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════
let authMode = 'login';

function setAuthMode(m) {
  authMode = m;
  $('tab-login').classList.toggle('active', m==='login');
  $('tab-reg').classList.toggle('active', m==='register');
  $('auth-btn').textContent = m==='login' ? 'Se connecter' : 'Créer mon compte';
  $('auth-forgot').style.display = m==='login' ? '' : 'none';
  $('auth-err').style.display = 'none';
  $('auth-ok').style.display = 'none';
}

async function doAuth() {
  const email = $('auth-email').value.trim();
  const pwd   = $('auth-pwd').value;

  if(!email || !pwd) {
    showErr('Remplissez tous les champs.');
    return;
  }

  const btn = $('auth-btn');
  btn.textContent = 'Chargement…';
  btn.disabled = true;

  try {
    if(authMode === 'login') {
      const {error} = await DB.auth.signInWithPassword({email, password:pwd});
      if(error) throw error;
    } else {
      const {error} = await DB.auth.signUp({email, password:pwd});
      if(error) throw error;
      showOk('Compte créé ! Vérifiez votre email puis connectez-vous.');
      setAuthMode('login');
    }
  } catch(e) {
    const m = {
      'Invalid login credentials':'Email ou mot de passe incorrect.',
      'User already registered':'Compte déjà existant.'
    };
    showErr(m[e.message] || e.message || 'Erreur inconnue.');
  }

  btn.disabled = false;
  btn.textContent = authMode==='login' ? 'Se connecter' : 'Créer mon compte';
}

async function doForgot() {
  const email = $('auth-email').value.trim();
  if(!email) {
    showErr('Entrez votre email.');
    return;
  }

  const {error} = await DB.auth.resetPasswordForEmail(email);
  if(error) showErr(error.message);
  else showOk('Email envoyé.');
}

function showErr(msg) {
  $('auth-err').textContent = msg;
  $('auth-err').style.display = 'block';
  $('auth-ok').style.display = 'none';
}

function showOk(msg) {
  $('auth-ok').textContent = msg;
  $('auth-ok').style.display = 'block';
  $('auth-err').style.display = 'none';
}

async function doLogout() {
  clearTimeout(_saveTimer);
  UID = null;
  $('auth').style.display = 'flex';
  $('app').style.display = 'none';
  await DB.auth.signOut();
}

// ════════════════════════════════════════════════════════
// APP START
// ════════════════════════════════════════════════════════
async function startApp(user) {
  UID = null;
  $('auth').style.display = 'none';
  $('app').style.display = 'flex';

  const saved = parseInt(localStorage.getItem('lp_annee_'+user.id));
  if(saved >= YEAR_MIN && saved <= YEAR_MAX) ANNEE = saved;

  UID = user.id;

  const av = $('sb-av');
  if(av) av.textContent = user.email[0].toUpperCase();

  const em = $('sb-email');
  if(em) em.textContent = user.email;

  renderAnneesNav();
  await Promise.all([loadParams(), loadArticles(), loadCharges()]);
  setSaved();
}

// ════════════════════════════════════════════════════════
// THEME & SIDEBAR
// ════════════════════════════════════════════════════════
function applyTheme() {
  const t = localStorage.getItem('lp-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  const lbl = $('theme-lbl');
  if(lbl) lbl.textContent = t==='light' ? '🌙 Thème sombre' : '☀️ Thème clair';
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('lp-theme', next);

  const lbl = $('theme-lbl');
  if(lbl) lbl.textContent = next==='light' ? '🌙 Thème sombre' : '☀️ Thème clair';
}

function toggleSidebar() {
  document.querySelector('.sb').classList.toggle('col');
  localStorage.setItem(
    'lp-sb-col',
    document.querySelector('.sb').classList.contains('col')
  );
}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  applyTheme();

  if(localStorage.getItem('lp-sb-col') === 'true') {
    document.querySelector('.sb').classList.add('col');
  }

  // Auth
  $('tab-login').addEventListener('click', () => setAuthMode('login'));
  $('tab-reg').addEventListener('click',   () => setAuthMode('register'));
  $('auth-btn').addEventListener('click',  doAuth);
  $('auth-forgot').addEventListener('click', doForgot);
  $('auth-email').addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); });
  $('auth-pwd').addEventListener('keydown',   e => { if(e.key==='Enter') doAuth(); });

  // Sidebar
  $('btn-logout').addEventListener('click', doLogout);
  $('btn-toggle-sb').addEventListener('click', toggleSidebar);
  $('btn-theme').addEventListener('click', toggleTheme);
  $('btn-year-prev').addEventListener('click', () => changeAnnee(ANNEE - 1));
  $('btn-year-next').addEventListener('click', () => changeAnnee(ANNEE + 1));

  // Tabs paramètres
  [
    ['tab-articles','p-articles'],
    ['tab-charges','p-charges'],
    ['tab-entreprise','p-entreprise']
  ].forEach(([tid,pid]) => {
    $(tid).addEventListener('click', () => {
      document.querySelectorAll('.tab-pnl').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
      $(pid).classList.add('active');
      $(tid).classList.add('active');
    });
  });

  // Articles
  $('btn-add-art').addEventListener('click', () => $('p-art-add').classList.toggle('open'));
  $('btn-add-art-ok').addEventListener('click', addArt);
  $('btn-add-art-cancel').addEventListener('click', () => $('p-art-add').classList.remove('open'));

  // Charges
  $('btn-add-ch').addEventListener('click', () => $('p-ch-add').classList.toggle('open'));
  $('btn-add-ch-ok').addEventListener('click', addCh);
  $('btn-add-ch-cancel').addEventListener('click', () => $('p-ch-add').classList.remove('open'));

  // Entreprise
  bindEntreprise();

  // Auth state
  let started = false;
  DB.auth.onAuthStateChange(async (event, session) => {
    if((event === 'INITIAL_SESSION' || event === 'SIGNED_IN') && session && !started) {
      started = true;
      await startApp(session.user);
    } else if(event === 'SIGNED_OUT') {
      started = false;
      UID = null;
      $('auth').style.display = 'flex';
      $('app').style.display = 'none';
    }
  });
});
</script>
